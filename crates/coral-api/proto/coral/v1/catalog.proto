syntax = "proto3";

package coral.v1;

import "coral/v1/resources.proto";

// Page request parameters for list-style APIs.
message PaginationRequest {
  // Maximum number of items to return. Zero means API-specific default or
  // unbounded behavior.
  uint32 limit = 1;
  // Number of matching items to skip before returning results.
  uint32 offset = 2;
}

// Page metadata returned by list-style APIs.
message PaginationResponse {
  // Matching item count before pagination.
  uint32 total_count = 1;
  // Applied result limit. Zero means unbounded.
  uint32 limit = 2;
  // Applied result offset.
  uint32 offset = 3;
  // Whether another page is available.
  bool has_more = 4;
  // Offset to request for the next page when `has_more` is true.
  uint32 next_offset = 5;
}

// A column exposed by a discoverable query table.
message Column {
  // The column name as exposed by the query engine.
  string name = 1;
  // The DataFusion/Arrow data type rendered as text.
  string data_type = 2;
  // Whether the column can contain null values.
  bool nullable = 3;
  // Whether the column is provider-derived metadata, such as a filter or computed column.
  bool is_virtual = 4;
  // Whether the column must be constrained before querying the table.
  bool is_required_filter = 5;
  // Human-readable column description.
  string description = 6;
  // Zero-based position of the column within the table.
  uint32 ordinal_position = 7;
}

// A query-visible table in one workspace.
message Table {
  // Workspace whose source set makes this table visible.
  Workspace workspace = 1;
  // The schema name used for SQL qualification.
  string schema_name = 2;
  // The bare table name within the schema.
  string name = 3;
  // The user-facing table description.
  string description = 4;
  // The columns exposed by the table.
  repeated Column columns = 5;
  // Required filter names, if any.
  repeated string required_filters = 6;
  // User-facing query guidance.
  string guide = 7;
}

// Table metadata without full column definitions.
message TableSummary {
  // Workspace that scopes this table.
  Workspace workspace = 1;
  // Source schema that owns the table.
  string schema_name = 2;
  // Table name within the schema.
  string name = 3;
  // Human-readable table description.
  string description = 4;
  // Filter names that must be constrained when querying this table.
  repeated string required_filters = 5;
  // User-facing query guidance.
  string guide = 6;
}

// An argument accepted by a source-scoped table function.
message TableFunctionArgument {
  // Argument name as used in a named SQL function call.
  string name = 1;
  // Whether callers must provide this argument.
  bool required = 2;
  // Allowed values, if the source declares an enum-like value set.
  repeated string values = 3;
}

// A result column returned by a source-scoped table function.
message TableFunctionResultColumn {
  // Column name returned by the table function.
  string name = 1;
  // The DataFusion/Arrow data type rendered as text.
  string data_type = 2;
  // Whether the column can contain null values.
  bool nullable = 3;
  // Human-readable column description.
  string description = 4;
}

// A source-scoped table function in one workspace.
message TableFunction {
  // Workspace whose source set makes this function visible.
  Workspace workspace = 1;
  // The schema name used for SQL qualification.
  string schema_name = 2;
  // The bare function name within the schema.
  string name = 3;
  // The user-facing function description.
  string description = 4;
  // Arguments accepted by the function.
  repeated TableFunctionArgument arguments = 5;
  // Columns returned by the function.
  repeated TableFunctionResultColumn result_columns = 6;
}

// Catalog item kind filter for unified discovery.
enum CatalogItemKind {
  // Return every currently supported catalog item kind.
  CATALOG_ITEM_KIND_UNSPECIFIED = 0;
  // Ordinary query-visible tables.
  CATALOG_ITEM_KIND_TABLE = 1;
  // Query-visible table functions.
  CATALOG_ITEM_KIND_TABLE_FUNCTION = 2;
}

// One queryable catalog item.
message CatalogItem {
  // Queryable catalog item payload.
  oneof item {
    // Ordinary query-visible table summary. Use ListColumns for column metadata.
    TableSummary table = 1;
    // Query-visible table function metadata.
    TableFunction table_function = 2;
  }
}

// Per-kind catalog counts after workspace/schema filtering and before item-kind
// filtering or pagination.
message CatalogCounts {
  // Query-visible table count.
  uint32 table_count = 1;
  // Query-visible table function count.
  uint32 table_function_count = 2;
}

// Lists queryable catalog items in one workspace.
message ListCatalogRequest {
  // Workspace whose current queryable catalog should be listed.
  Workspace workspace = 1;
  // Optional exact schema/source name.
  string schema_name = 2;
  // Optional item kind. Unspecified lists every currently supported kind.
  CatalogItemKind kind = 3;
  // Optional page request. Missing or zero limit keeps the unbounded behavior.
  PaginationRequest pagination = 4;
}

// Returns queryable catalog items in one workspace.
message ListCatalogResponse {
  // Queryable catalog items for the requested page.
  repeated CatalogItem items = 1;
  // Page metadata for the catalog list.
  PaginationResponse pagination = 2;
  // Per-kind counts for the current workspace/schema catalog snapshot.
  CatalogCounts counts = 3;
}

// Searches queryable catalog metadata.
message SearchCatalogRequest {
  // Workspace whose current queryable catalog should be searched.
  Workspace workspace = 1;
  // Rust regex pattern matched over catalog metadata.
  string pattern = 2;
  // Whether regex matching should ignore case.
  bool ignore_case = 3;
  // Optional exact schema/source name.
  string schema_name = 4;
  // Optional item kind. Unspecified searches every currently supported kind.
  CatalogItemKind kind = 5;
  // Optional page request. Missing or zero limit applies the search default.
  PaginationRequest pagination = 6;
}

// One catalog search match.
message CatalogSearchResult {
  // Matched catalog item metadata.
  CatalogItem item = 1;
  // Metadata fields matched by the pattern.
  repeated string matched_fields = 2;
}

// Returns catalog metadata matches.
message SearchCatalogResponse {
  // Matching catalog items for the requested page.
  repeated CatalogSearchResult items = 1;
  // Page metadata for the catalog search.
  PaginationResponse pagination = 2;
}

// Fetches one query-visible table.
message DescribeTableRequest {
  // Workspace whose current query-visible tables should be inspected.
  Workspace workspace = 1;
  // Exact schema/source name.
  string schema_name = 2;
  // Exact table name.
  string table_name = 3;
}

// Returns one table, or app-owned missing-table discovery context.
message DescribeTableResponse {
  // The exact table when found.
  Table table = 1;
  // Suggested nearby tables when the exact table is missing.
  repeated TableSummary suggestions = 2;
  // Query-visible schemas available in this workspace.
  repeated string available_schemas = 3;
  // Tables in the requested schema, capped for user-facing missing-table help.
  repeated TableSummary same_schema_tables = 4;
}

// Lists and filters columns for one query-visible table.
message ListColumnsRequest {
  // Workspace whose current query-visible tables should be inspected.
  Workspace workspace = 1;
  // Exact schema/source name.
  string schema_name = 2;
  // Exact table name.
  string table_name = 3;
  // Optional Rust regex pattern matched over column metadata.
  optional string pattern = 4;
  // Whether regex matching should ignore case.
  bool ignore_case = 5;
  // Whether only required filter columns should be returned.
  bool required_only = 6;
  // Optional page request. Missing or zero limit applies the column-list default.
  PaginationRequest pagination = 7;
}

// One column search match.
message ColumnSearchResult {
  // Matched column metadata.
  Column column = 1;
  // Metadata fields matched by the pattern.
  repeated string matched_fields = 2;
}

// Returns column metadata matches.
message ListColumnsResponse {
  // Matching columns for the requested page.
  repeated ColumnSearchResult columns = 1;
  // Page metadata for the column list.
  PaginationResponse pagination = 2;
}

// Catalog discovery APIs.
service CatalogService {
  // Lists queryable catalog items for one workspace.
  rpc ListCatalog(ListCatalogRequest) returns (ListCatalogResponse);
  // Searches queryable catalog metadata.
  rpc SearchCatalog(SearchCatalogRequest) returns (SearchCatalogResponse);
  // Fetches one query-visible table.
  rpc DescribeTable(DescribeTableRequest) returns (DescribeTableResponse);
  // Lists and filters columns for one query-visible table.
  rpc ListColumns(ListColumnsRequest) returns (ListColumnsResponse);
}
