name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      github_actions: ${{ steps.filter.outputs.github_actions }}
      rust_checks: ${{ steps.filter.outputs.rust_checks }}
      release_workflow: ${{ steps.filter.outputs.release_workflow }}
      install-script: ${{ steps.filter.outputs.install-script }}
      ui-build: ${{ steps.filter.outputs.ui-build }}
      ui-tests: ${{ steps.filter.outputs.ui-tests }}
      proto-lint: ${{ steps.filter.outputs.proto-lint }}
      source-lint: ${{ steps.filter.outputs.source-lint }}
      docs-freshness: ${{ steps.filter.outputs.docs-freshness }}
      license-check: ${{ steps.filter.outputs.license-check }}
      performance-regression: ${{ steps.filter.outputs.performance-regression }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            github_actions:
              - '.github/workflows/**'
            rust_checks:
              - '.github/workflows/validate.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'rust-toolchain.toml'
              - 'rust-toolchain'
              - 'crates/**'
              - 'xtask/**'
            release_workflow:
              - '.github/workflows/release.yml'
            install-script:
              - '.github/workflows/validate.yml'
              - 'scripts/install.sh'
            ui-build:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            ui-tests:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            proto-lint:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'crates/coral-api/buf.yaml'
              - 'crates/coral-api/proto/**/*.proto'
            source-lint:
              - '.github/workflows/validate.yml'
              - '.yamllint.yaml'
              - 'Makefile'
              - 'sources/**/*.yaml'
              - 'sources/**/*.yml'
            docs-freshness:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'xtask/Cargo.toml'
              - 'xtask/src/main.rs'
              - 'xtask/src/docs/**'
              - 'xtask/src/sources.rs'
              - 'crates/coral-spec/**'
              - 'sources/core/**'
              - 'docs/**'
              - 'CHANGELOG.md'
            license-check:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'deny.toml'
            performance-regression:
              - '.github/workflows/validate.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'rust-toolchain.toml'
              - 'rust-toolchain'
              - 'crates/**'
              - 'xtask/Cargo.toml'
              - 'xtask/src/main.rs'
              - 'xtask/src/perf.rs'
              - 'sources/core/github/**'

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_checks == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-validate-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: nextest

      - name: Run make rust-checks
        run: make rust-checks

  windows-rust-smoke:
    name: Windows Rust smoke
    runs-on: windows-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_checks == 'true' || needs.changes.outputs.release_workflow == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-windows-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build CLI
        shell: pwsh
        run: cargo build --locked -p coral-cli --all-features

      - name: Smoke CLI
        shell: pwsh
        run: |
          .\target\debug\coral.exe --version
          .\target\debug\coral.exe source discover
          .\target\debug\coral.exe completion powershell > $null

  install-script:
    name: Install script (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: ${{ needs.changes.outputs.install-script == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Verify runner target
        env:
          EXPECTED_TARGET: ${{ matrix.target }}
        run: |
          case "$(uname -s):$(uname -m)" in
            Linux:x86_64) actual_target="x86_64-unknown-linux-gnu" ;;
            Linux:aarch64) actual_target="aarch64-unknown-linux-gnu" ;;
            Darwin:x86_64) actual_target="x86_64-apple-darwin" ;;
            Darwin:arm64) actual_target="aarch64-apple-darwin" ;;
            *)
              echo "Unsupported validation runner: $(uname -s):$(uname -m)" >&2
              exit 1
              ;;
          esac

          if [ "$actual_target" != "$EXPECTED_TARGET" ]; then
            echo "Expected $EXPECTED_TARGET, got $actual_target" >&2
            exit 1
          fi

      - name: Resolve latest Coral release
        id: coral-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "User-Agent: withcoral-install-ci" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" |
              sed -n 's/.*"tag_name":[[:space:]]*"\([^"]*\)".*/\1/p' |
              head -n 1
          )"

          if [ -z "$version" ]; then
            echo "Could not determine latest Coral release version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run install script
        env:
          # Keep tokens out of PR-controlled installer code; pass only the resolved release version.
          CORAL_VERSION: ${{ steps.coral-release.outputs.version }}
          GITHUB_TOKEN: ""
        run: |
          install_dir="$RUNNER_TEMP/coral-bin"
          CORAL_INSTALL_DIR="$install_dir" sh < scripts/install.sh
          "$install_dir/coral" --version

  ui-build:
    name: UI build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui-build == 'true' || needs.changes.outputs.rust_checks == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          package-manager-cache: false

      - name: Set up Node with trusted npm cache
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Lint and format check
        run: npm run check --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Verify UI entrypoint
        run: test -s ui/dist/index.html

      - name: Verify production build excludes test mocks
        run: |
          if grep -R -E 'mockServiceWorker|setupWorker|@msw/playwright|mockScenario|PW_UI_SCREENCAST' ui/dist; then
            echo 'Production UI build contains test/mock-only code' >&2
            exit 1
          fi

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui-tests == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          package-manager-cache: false

      - name: Set up Node with trusted npm cache
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Type-check UI tests
        run: npm run test:ui:type-check --prefix ui

      - name: Install Chromium for Playwright
        run: npm exec --prefix ui -- playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:ui --prefix ui

      - name: Upload UI test artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-test-results
          path: |
            ui/test-results/**
            ui/playwright-report/**
          if-no-files-found: ignore

  proto-lint:
    name: Lint protobuf API
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.proto-lint == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install buf
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.69.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run make lint-proto
        run: make lint-proto

  gha-security-audit-pr:
    name: Github Actions security audit with zizmor (PR)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.github_actions == 'true' && github.event_name == 'pull_request' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2
          annotations: true
          advanced-security: false
          min-severity: low

  gha-security-audit-sarif:
    name: Github Actions security audit with zizmor (SARIF)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.github_actions == 'true' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2
          annotations: false
          advanced-security: true
          min-severity: low

  source-lint:
    name: Lint source manifests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.source-lint == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-source-lint-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install ryl
        run: cargo install ryl --locked

      - name: Run make lint-sources
        run: make lint-sources

  docs-freshness:
    name: Docs freshness check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs-freshness == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-docs-freshness-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run make docs-check
        run: make docs-check

  license-check:
    name: Dependency license scan
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.license-check == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-license-check-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-deny

      - name: Run make license-check
        run: make license-check

  performance-regression:
    name: Performance regression
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.performance-regression == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Keep this separate from Rust checks. GitHub caches are immutable on
          # exact-key hits, so sharing the debug/test cache prevents this job's
          # release artifacts from warming future performance runs.
          shared-key: coral-perf-release-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install hyperfine
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: hyperfine@1.20.0
          fallback: cargo-install

      - name: Build CLI
        run: cargo build --locked -p coral-cli --release

      - name: Benchmark coral.tables query
        run: |
          cargo run --locked -p xtask --release -- perf-check \
            --coral-bin target/release/coral \
            --max-mean-seconds 0.75

  validate:
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        rust-checks,
        windows-rust-smoke,
        install-script,
        ui-build,
        ui-tests,
        proto-lint,
        gha-security-audit-pr,
        gha-security-audit-sarif,
        source-lint,
        docs-freshness,
        license-check,
        performance-regression,
      ]
    # Run even when upstream jobs fail or are conditionally skipped so this
    # job can act as the single required status check for the workflow.
    if: ${{ always() }}
    steps:
      - name: Check all job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUST_CHECKS_RESULT: ${{ needs.rust-checks.result }}
          WINDOWS_RUST_SMOKE_RESULT: ${{ needs.windows-rust-smoke.result }}
          INSTALL_SCRIPT_RESULT: ${{ needs.install-script.result }}
          UI_BUILD_RESULT: ${{ needs.ui-build.result }}
          UI_TESTS_RESULT: ${{ needs.ui-tests.result }}
          PROTO_LINT_RESULT: ${{ needs.proto-lint.result }}
          GHA_SECURITY_AUDIT_PR_RESULT: ${{ needs.gha-security-audit-pr.result }}
          GHA_SECURITY_AUDIT_SARIF_RESULT: ${{ needs.gha-security-audit-sarif.result }}
          SOURCE_LINT_RESULT: ${{ needs.source-lint.result }}
          DOCS_FRESHNESS_RESULT: ${{ needs.docs-freshness.result }}
          LICENSE_CHECK_RESULT: ${{ needs.license-check.result }}
          PERFORMANCE_REGRESSION_RESULT: ${{ needs.performance-regression.result }}
        run: |
          jobs=(
            "changes:$CHANGES_RESULT"
            "rust-checks:$RUST_CHECKS_RESULT"
            "windows-rust-smoke:$WINDOWS_RUST_SMOKE_RESULT"
            "install-script:$INSTALL_SCRIPT_RESULT"
            "ui-build:$UI_BUILD_RESULT"
            "ui-tests:$UI_TESTS_RESULT"
            "proto-lint:$PROTO_LINT_RESULT"
            "gha-security-audit-pr:$GHA_SECURITY_AUDIT_PR_RESULT"
            "gha-security-audit-sarif:$GHA_SECURITY_AUDIT_SARIF_RESULT"
            "source-lint:$SOURCE_LINT_RESULT"
            "docs-freshness:$DOCS_FRESHNESS_RESULT"
            "license-check:$LICENSE_CHECK_RESULT"
            "performance-regression:$PERFORMANCE_REGRESSION_RESULT"
          )

          failed=0
          for job_status in "${jobs[@]}"; do
            job_name="${job_status%%:*}"
            result="${job_status#*:}"

            if [[ -z "$result" ]]; then
              echo "$job_name has no recorded result"
              failed=1
              continue
            fi

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "$job_name: $result"
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            exit 1
          fi
