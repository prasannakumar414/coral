name: linear
version: 2.3.0
dsl_version: 3
backend: http
description: >-
  Query Linear teams, users, issues, issue relations, projects, project
  milestones, cycles, initiatives, initiative-project links, labels, and
  attachments.
inputs:
  LINEAR_API_KEY:
    kind: secret
    hint: |
      Create a personal API key with the Read permission, which gives
      read-only access to all tables. You can optionally scope the key
      to specific teams.
      See [Linear API key docs](https://linear.app/docs/api-and-webhooks#api-keys).
base_url: https://api.linear.app
auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: "{{input.LINEAR_API_KEY}}"
test_queries:
  - SELECT * FROM linear.users LIMIT 1
functions:
  - name: project_milestones
    description: Milestones for a specific Linear project
    args:
      - name: project_id
        required: true
        bind:
          arg: project_id
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query ProjectMilestones($projectId: String!, $first: Int!, $after: String) {
              project(id: $projectId) {
                id
                projectMilestones(first: $first, after: $after) {
                  nodes {
                    id
                    name
                    description
                    progress
                    sortOrder
                    status
                    targetDate
                    createdAt
                    updatedAt
                    archivedAt
                  }
                  pageInfo {
                    endCursor
                  }
                }
              }
            }
        - path:
            - variables
            - projectId
          from: arg
          key: project_id
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - project
        - projectMilestones
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - project
        - projectMilestones
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Project milestone ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Project milestone name
        expr:
          kind: path
          path:
            - name
      - name: description
        type: Utf8
        nullable: true
        description: Project milestone description
        expr:
          kind: path
          path:
            - description
      - name: progress
        type: Float64
        nullable: false
        description: Project milestone progress fraction
        expr:
          kind: path
          path:
            - progress
      - name: sort_order
        type: Float64
        nullable: false
        description: Project milestone sort order
        expr:
          kind: path
          path:
            - sortOrder
      - name: status
        type: Utf8
        nullable: false
        description: Project milestone status
        expr:
          kind: path
          path:
            - status
      - name: target_date
        type: Utf8
        nullable: true
        description: Planned milestone completion date
        expr:
          kind: path
          path:
            - targetDate
      - name: created_at
        type: Utf8
        nullable: false
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: false
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
      - name: archived_at
        type: Utf8
        nullable: true
        description: Archive timestamp
        expr:
          kind: path
          path:
            - archivedAt
  - name: project_updates
    description: Updates for a specific Linear project
    args:
      - name: project_id
        required: true
        bind:
          arg: project_id
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query ProjectUpdates($projectId: String!, $first: Int!, $after: String) {
              project(id: $projectId) {
                id
                projectUpdates(first: $first, after: $after) {
                  nodes {
                    id
                    slugId
                    body
                    health
                    url
                    createdAt
                    updatedAt
                    user {
                      id
                      name
                      displayName
                      email
                    }
                  }
                  pageInfo {
                    endCursor
                  }
                }
              }
            }
        - path:
            - variables
            - projectId
          from: arg
          key: project_id
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - project
        - projectUpdates
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - project
        - projectUpdates
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Project update ID
        expr:
          kind: path
          path:
            - id
      - name: body
        type: Utf8
        nullable: true
        description: Project update body
        expr:
          kind: path
          path:
            - body
      - name: slug_id
        type: Utf8
        nullable: true
        description: Project update short slug identifier
        expr:
          kind: path
          path:
            - slugId
      - name: health
        type: Utf8
        nullable: true
        description: "Project update health: onTrack, atRisk, or offTrack"
        expr:
          kind: path
          path:
            - health
      - name: url
        type: Utf8
        nullable: true
        description: Project update URL
        expr:
          kind: path
          path:
            - url
      - name: author_id
        type: Utf8
        nullable: true
        description: Project update author user ID
        expr:
          kind: path
          path:
            - user
            - id
      - name: author_name
        type: Utf8
        nullable: true
        description: Project update author name
        expr:
          kind: path
          path:
            - user
            - name
      - name: author_display_name
        type: Utf8
        nullable: true
        description: Project update author display name
        expr:
          kind: path
          path:
            - user
            - displayName
      - name: author_email
        type: Utf8
        nullable: true
        description: Project update author email
        expr:
          kind: path
          path:
            - user
            - email
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
  - name: issue_comments
    description: Comments for a specific Linear issue identifier, for example SOURCE-496.
    args:
      - name: issue
        required: true
        bind:
          arg: issue
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query IssueCommentsByIdentifier($teamKey: String!, $issueNumber: Float!, $first: Int!, $after: String) {
              issues(filter: { team: { key: { eq: $teamKey } }, number: { eq: $issueNumber } }, first: 1) {
                nodes {
                  id
                  identifier
                  comments(first: $first, after: $after) {
                    nodes {
                      id
                      body
                      createdAt
                      updatedAt
                      user {
                        id
                        name
                        displayName
                        email
                      }
                    }
                    pageInfo {
                      endCursor
                    }
                  }
                }
              }
            }
        - path:
            - variables
            - teamKey
          from: arg_split
          key: issue
          separator: "-"
          part: 0
        - path:
            - variables
            - issueNumber
          from: arg_split_int
          key: issue
          separator: "-"
          part: 1
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - issues
        - nodes
        - "0"
        - comments
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - issues
        - nodes
        - "0"
        - comments
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Comment ID
        expr:
          kind: path
          path:
            - id
      - name: body
        type: Utf8
        nullable: true
        description: Comment body
        expr:
          kind: path
          path:
            - body
      - name: author_id
        type: Utf8
        nullable: true
        description: Comment author user ID
        expr:
          kind: path
          path:
            - user
            - id
      - name: author_name
        type: Utf8
        nullable: true
        description: Comment author name
        expr:
          kind: path
          path:
            - user
            - name
      - name: author_display_name
        type: Utf8
        nullable: true
        description: Comment author display name
        expr:
          kind: path
          path:
            - user
            - displayName
      - name: author_email
        type: Utf8
        nullable: true
        description: Comment author email
        expr:
          kind: path
          path:
            - user
            - email
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
  - name: team_issues
    description: Issues for a specific Linear team
    args:
      - name: team_id
        required: true
        bind:
          arg: team_id
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query TeamIssues($teamId: String!, $first: Int!, $after: String) {
              team(id: $teamId) {
                id
                issues(first: $first, after: $after) {
                  nodes {
                    id
                    identifier
                    title
                    priority
                    createdAt
                    updatedAt
                    state {
                      id
                      name
                    }
                    assignee {
                      id
                      name
                      email
                    }
                    project {
                      id
                    }
                  }
                  pageInfo {
                    endCursor
                  }
                }
              }
            }
        - path:
            - variables
            - teamId
          from: arg
          key: team_id
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - team
        - issues
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - team
        - issues
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Issue ID
        expr:
          kind: path
          path:
            - id
      - name: identifier
        type: Utf8
        nullable: false
        description: Issue identifier
        expr:
          kind: path
          path:
            - identifier
      - name: title
        type: Utf8
        nullable: false
        description: Issue title
        expr:
          kind: path
          path:
            - title
      - name: priority
        type: Int64
        nullable: true
        description: Issue priority
        expr:
          kind: path
          path:
            - priority
      - name: state_name
        type: Utf8
        nullable: true
        description: Workflow state name
        expr:
          kind: path
          path:
            - state
            - name
      - name: assignee_name
        type: Utf8
        nullable: true
        description: Assignee name
        expr:
          kind: path
          path:
            - assignee
            - name
      - name: assignee_email
        type: Utf8
        nullable: true
        description: Assignee email
        expr:
          kind: path
          path:
            - assignee
            - email
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: project_id
        type: Utf8
        nullable: true
        description: Project ID
        expr:
          kind: path
          path:
            - project
            - id
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
tables:
  - name: teams
    description: Teams in the Linear workspace
    guide: |
      Start here to discover `team_id` and `team_key` values for
      team-scoped tables. `private` can explain why some users cannot see
      related issues.
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Teams($first: Int!, $after: String) {
              teams(first: $first, after: $after) {
                nodes {
                  id
                  key
                  name
                  description
                  private
                  cyclesEnabled
                  activeCycle {
                    id
                    number
                    name
                    startsAt
                    endsAt
                    completedAt
                  }
                  createdAt
                  updatedAt
                }
                pageInfo {
                  endCursor
                }
              }
            }
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - teams
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - teams
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Team ID
        expr:
          kind: path
          path:
            - id
      - name: key
        type: Utf8
        nullable: false
        description: Team key
        expr:
          kind: path
          path:
            - key
      - name: name
        type: Utf8
        nullable: false
        description: Team name
        expr:
          kind: path
          path:
            - name
      - name: description
        type: Utf8
        nullable: true
        description: Team description
        expr:
          kind: path
          path:
            - description
      - name: private
        type: Boolean
        nullable: true
        description: Whether the team is private
        expr:
          kind: path
          path:
            - private
      - name: cycles_enabled
        type: Boolean
        nullable: true
        description: Whether the team has Linear cycles enabled
        expr:
          kind: path
          path:
            - cyclesEnabled
      - name: active_cycle_id
        type: Utf8
        nullable: true
        description: Current active cycle ID for this team
        expr:
          kind: path
          path:
            - activeCycle
            - id
      - name: active_cycle_number
        type: Int64
        nullable: true
        description: Current active cycle number for this team
        expr:
          kind: path
          path:
            - activeCycle
            - number
      - name: active_cycle_name
        type: Utf8
        nullable: true
        description: Current active cycle name for this team
        expr:
          kind: path
          path:
            - activeCycle
            - name
      - name: active_cycle_starts_at
        type: Utf8
        nullable: true
        description: Current active cycle start timestamp
        expr:
          kind: path
          path:
            - activeCycle
            - startsAt
      - name: active_cycle_ends_at
        type: Utf8
        nullable: true
        description: Current active cycle end timestamp
        expr:
          kind: path
          path:
            - activeCycle
            - endsAt
      - name: active_cycle_completed_at
        type: Utf8
        nullable: true
        description: Current active cycle completion timestamp
        expr:
          kind: path
          path:
            - activeCycle
            - completedAt
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
  - name: users
    description: Users in the Linear workspace
    guide: |
      Workspace user dimension table. Join `id` to attachment
      `creator_id`, or use user names and emails to interpret issue
      assignee fields.
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Users($first: Int!, $after: String) {
              users(first: $first, after: $after) {
                nodes {
                  id
                  name
                  displayName
                  email
                  active
                  admin
                  createdAt
                  updatedAt
                }
                pageInfo {
                  endCursor
                }
              }
            }
        - path:
            - variables
            - first
          from: literal
          value: 100
    response:
      rows_path:
        - data
        - users
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - users
        - pageInfo
        - endCursor
      page_size:
        default: 100
        max: 250
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: User ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: true
        description: User full name
        expr:
          kind: path
          path:
            - name
      - name: display_name
        type: Utf8
        nullable: true
        description: User display name
        expr:
          kind: path
          path:
            - displayName
      - name: email
        type: Utf8
        nullable: true
        description: User email address
        expr:
          kind: path
          path:
            - email
      - name: active
        type: Boolean
        nullable: true
        description: Whether the user is active
        expr:
          kind: path
          path:
            - active
      - name: admin
        type: Boolean
        nullable: true
        description: Whether the user is an admin
        expr:
          kind: path
          path:
            - admin
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
  - name: projects
    description: Projects in the Linear workspace
    guide: |
      Use this table to discover `project_id` values before querying
      milestones or project updates. Team columns let you group projects
      without another join.
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Projects($first: Int!, $after: String) {
              projects(first: $first, after: $after) {
                nodes {
                  id
                  name
                  description
                  slugId
                  state
                  progress
                  targetDate
                  createdAt
                  updatedAt
                  initiatives(first: 1) {
                    nodes {
                      id
                      name
                    }
                  }
                  teams {
                    nodes {
                      id
                      key
                      name
                    }
                  }
                }
                pageInfo {
                  endCursor
                }
              }
            }
        - path:
            - variables
            - first
          from: literal
          value: 50
    response:
      rows_path:
        - data
        - projects
        - nodes
    pagination:
      mode: cursor_body
      cursor_body_path:
        - variables
        - after
      response_cursor_path:
        - data
        - projects
        - pageInfo
        - endCursor
      page_size:
        default: 50
        max: 50
        body_path:
          - variables
          - first
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Project ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Project name
        expr:
          kind: path
          path:
            - name
      - name: description
        type: Utf8
        nullable: true
        description: Project description
        expr:
          kind: path
          path:
            - description
      - name: slug_id
        type: Utf8
        nullable: true
        description: Project short slug identifier
        expr:
          kind: path
          path:
            - slugId
      - name: state
        type: Utf8
        nullable: true
        description: Project state
        expr:
          kind: path
          path:
            - state
      - name: progress
        type: Float64
        nullable: true
        description: Project progress fraction
        expr:
          kind: path
          path:
            - progress
      - name: target_date
        type: Utf8
        nullable: true
        description: Project target date
        expr:
          kind: path
          path:
            - targetDate
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Updated timestamp
        expr:
          kind: path
          path:
            - updatedAt
      - name: initiative_id
        type: Utf8
        nullable: true
        description: First linked initiative ID
        expr:
          kind: first_array_item_path
          path:
            - initiatives
            - nodes
          item_path:
            - id
      - name: initiative_name
        type: Utf8
        nullable: true
        description: First linked initiative name
        expr:
          kind: first_array_item_path
          path:
            - initiatives
            - nodes
          item_path:
            - name
      - name: team_id
        type: Utf8
        nullable: true
        description: Owning team ID
        expr:
          kind: first_array_item_path
          path:
            - teams
            - nodes
          item_path:
            - id
      - name: team_key
        type: Utf8
        nullable: true
        description: Owning team key
        expr:
          kind: first_array_item_path
          path:
            - teams
            - nodes
          item_path:
            - key
      - name: team_name
        type: Utf8
        nullable: true
        description: Owning team name
        expr:
          kind: first_array_item_path
          path:
            - teams
            - nodes
          item_path:
            - name
  - name: cycles
    description: Cycles in the Linear workspace
    guide: |
      Optionally filter by `team_id` to keep results scoped to one team.
      Without a filter, this table returns cycles across the whole
      workspace.
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Cycles($filter: CycleFilter, $first: Int!, $after: String) {
              cycles(filter: $filter, first: $first, after: $after) {
                nodes {
                  id
                  number
                  name
                  startsAt
                  endsAt
                  completedAt
                  isActive
                  isPrevious
                  isNext
                  team {
                    id
                    key
                  }
                }
                pageInfo {
                  endCursor
                }
              }
            }
        - path:
            - variables
            - filter
            - team
            - id
            - eq
          from: filter
          key: team_id
        - path:
            - variables
            - filter
            - team
            - key
            - eq
          from: filter
          key: team_key
        - path:
            - variables
            - filter
            - isActive
            - eq
          from: filter_bool
          key: is_active
        - path:
            - variables
            - filter
            - isPrevious
            - eq
          from: filter_bool
          key: is_previous
        - path:
            - variables
            - filter
            - isNext
            - eq
          from: filter_bool
          key: is_next
        - path:
            - variables
            - first
          from: literal
          value: 100
