  - name: attachments
    description: Attachments (including pull requests) linked to Linear issues
    guide: |
      Includes external links such as pull requests attached to issues.
      Join `issue_id` or `issue_identifier` back to `linear.issues` for
      issue context.
    request:
      method: POST
      path: /graphql
      query: []
      body:
        - path:
            - query
          from: literal
          value: |
            query Attachments($first: Int!, $after: String) {
              attachments(first: $first, after: $after) {
                nodes {
                  id
                  title
                  subtitle
                  url
                  sourceType
                  createdAt
                  updatedAt
                  issue {
                    id
                    identifier
                  }
                  creator {
                    id
                    name
                  }
                }
                pageInfo {
                  endCursor
                }
              }
            }
        - path:
            - variables
            - first
          from: literal
          value: 100
