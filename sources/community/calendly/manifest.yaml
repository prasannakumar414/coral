  - name: scheduled_event_hosts
    description: >
      Returns the host memberships for a specific scheduled event. Each row is
      one host assigned to the event, with their email, display name, and buffered
      schedule window. Pass the event UUID as the required argument. Join with
      organization_memberships on user__uri = user to enrich host rows with
      team member details.
    args:
      - name: event_uuid
        required: true
        bind:
          arg: event_uuid
    request:
      method: GET
      path: "/scheduled_events/{{arg.event_uuid}}"
    response:
      rows_path:
        - resource
        - event_memberships
      row_strategy: direct
    pagination:
      mode: none
    columns:
      - name: user
        type: Utf8
        description: URI of the host user. Joinable with organization_memberships.user__uri.
      - name: user_email
        type: Utf8
        description: Email address of the host.
      - name: user_name
        type: Utf8
        nullable: true
        description: Display name of the host.
      - name: buffered_start_time
        type: Timestamp
        nullable: true
        description: Start time including any configured buffer period before the event (UTC).
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path:
              - buffered_start_time
      - name: buffered_end_time
        type: Timestamp
        nullable: true
        description: End time including any configured buffer period after the event (UTC).
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path:
              - buffered_end_time
