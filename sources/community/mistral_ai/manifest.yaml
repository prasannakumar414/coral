name: mistral_ai
version: 0.1.0
dsl_version: 3
backend: http
description: Query Mistral AI models and run bounded chat-completion and embedding checks through SQL.
base_url: https://api.mistral.ai/v1
inputs:
  MISTRAL_API_KEY:
    kind: secret
    hint: |
      Mistral AI API key.

      Create or copy an API key from:
      https://console.mistral.ai/api-keys

      The key is sent as a Bearer token to Mistral AI's API.
auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: "Bearer {{input.MISTRAL_API_KEY}}"
test_queries:
  - SELECT id, object, owned_by FROM mistral_ai.models LIMIT 5
tables:
  - name: models
    description: Mistral AI models available to the API key from GET /models.
    request:
      method: GET
      path: /models
    response:
      rows_path:
        - data
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Model ID used in Mistral AI requests.
      - name: object
        type: Utf8
        nullable: true
        description: API object type.
      - name: created
        type: Int64
        nullable: true
        description: Model creation timestamp when returned by the API.
      - name: owned_by
        type: Utf8
        nullable: true
        description: Owner metadata when returned by the API.
      - name: name
        type: Utf8
        nullable: true
        description: Human-readable model name when returned by the API.
      - name: description
        type: Utf8
        nullable: true
        description: Model description.
      - name: root
        type: Utf8
        nullable: true
        description: Root model for fine-tuned models when returned.
      - name: max_context_length
        type: Int64
        nullable: true
        description: Maximum context length when returned by the API.
      - name: aliases
        type: Utf8
        nullable: true
        description: Comma-separated model aliases.
        expr:
          kind: join_array
          path:
            - aliases
          separator: ", "
      - name: deprecation
        type: Utf8
        nullable: true
        description: Deprecation metadata when returned.
      - name: deprecation_replacement_model
        type: Utf8
        nullable: true
        description: Replacement model ID when returned.
      - name: default_model_temperature
        type: Float64
        nullable: true
        description: Default model temperature when returned.
      - name: type
        type: Utf8
        nullable: true
        description: Model type metadata when returned.
        expr:
          kind: path
          path:
            - type
      - name: archived
        type: Boolean
        nullable: true
        description: Whether a fine-tuned model is archived.
      - name: capabilities
        type: Json
        nullable: true
        description: Raw model capabilities object.
      - name: completion_chat
        type: Boolean
        nullable: true
        description: Whether the model supports chat completions.
        expr:
          kind: path
          path:
            - capabilities
            - completion_chat
      - name: completion_fim
        type: Boolean
        nullable: true
        description: Whether the model supports fill-in-the-middle completions.
        expr:
          kind: path
          path:
            - capabilities
            - completion_fim
      - name: function_calling
        type: Boolean
        nullable: true
        description: Whether the model supports function calling.
        expr:
          kind: path
          path:
            - capabilities
            - function_calling
      - name: fine_tuning
        type: Boolean
        nullable: true
        description: Whether the model supports fine tuning.
        expr:
          kind: path
          path:
            - capabilities
            - fine_tuning
      - name: vision
        type: Boolean
        nullable: true
        description: Whether the model supports vision inputs.
        expr:
          kind: path
          path:
            - capabilities
            - vision
      - name: classification
        type: Boolean
        nullable: true
        description: Whether the model supports classification.
        expr:
          kind: path
          path:
            - capabilities
            - classification

  - name: chat_completions
    description: Run one non-streaming, single-turn Mistral AI chat completion with a required max_tokens bound.
    filters:
      - name: model
        required: true
      - name: prompt
        required: true
      - name: max_tokens
        required: true
    request:
      method: POST
      path: /chat/completions
      headers:
        - name: Content-Type
          from: literal
          value: application/json
      body:
        - path:
            - model
          from: filter
          key: model
        - path:
            - messages
            - "0"
            - role
          from: literal
          value: user
        - path:
            - messages
            - "0"
            - content
          from: filter
          key: prompt
        - path:
            - max_tokens
          from: filter_int
          key: max_tokens
        - path:
            - stream
          from: literal
          value: false
    response:
      row_strategy: direct
    pagination:
      mode: none
    columns:
      - name: model
        type: Utf8
        nullable: false
        virtual: true
        description: Model supplied in SQL filter.
        expr:
          kind: from_filter
          key: model
      - name: prompt
        type: Utf8
        nullable: false
        virtual: true
        description: Prompt supplied in SQL filter.
        expr:
          kind: from_filter
          key: prompt
      - name: max_tokens
        type: Int64
        nullable: false
        virtual: true
        description: Positive max_tokens value supplied in SQL filter.
        expr:
          kind: from_filter
          key: max_tokens
      - name: id
        type: Utf8
        nullable: true
        description: Chat completion response ID.
      - name: object
        type: Utf8
        nullable: true
        description: API object type.
      - name: created
        type: Int64
        nullable: true
        description: Response creation timestamp.
      - name: returned_model
        type: Utf8
        nullable: true
        description: Actual model returned by Mistral AI.
        expr:
          kind: path
          path:
            - model
      - name: usage
        type: Json
        nullable: true
        description: Token usage metadata returned by Mistral AI.
      - name: prompt_tokens
        type: Int64
        nullable: true
        description: Prompt token count.
        expr:
          kind: path
          path:
            - usage
            - prompt_tokens
      - name: completion_tokens
        type: Int64
        nullable: true
        description: Completion token count.
        expr:
          kind: path
          path:
            - usage
            - completion_tokens
      - name: total_tokens
        type: Int64
        nullable: true
        description: Total token count.
        expr:
          kind: path
          path:
            - usage
            - total_tokens
      - name: prompt_tokens_details
        type: Json
        nullable: true
        description: Prompt token detail metadata when returned by Mistral AI.
        expr:
          kind: path
          path:
            - usage
            - prompt_tokens_details
      - name: choices
        type: Json
        nullable: true
        description: Raw choices array returned by Mistral AI.
      - name: index
        type: Int64
        nullable: true
        description: First choice index.
        expr:
          kind: path
          path:
            - choices
            - "0"
            - index
      - name: finish_reason
        type: Utf8
        nullable: true
        description: Why the model stopped.
        expr:
          kind: path
          path:
            - choices
            - "0"
            - finish_reason
      - name: content
        type: Utf8
        nullable: true
        description: Assistant response text.
        expr:
          kind: path
          path:
            - choices
            - "0"
            - message
            - content
      - name: message_role
        type: Utf8
        nullable: true
        description: Assistant message role.
        expr:
          kind: path
          path:
            - choices
            - "0"
            - message
            - role
      - name: tool_calls
        type: Json
        nullable: true
        description: Tool calls returned on the assistant message when present.
        expr:
          kind: path
          path:
            - choices
            - "0"
            - message
            - tool_calls

  - name: embeddings
    description: Generate one Mistral AI embedding vector through POST /embeddings.
    filters:
      - name: model
        required: true
      - name: input
        required: true
    request:
      method: POST
      path: /embeddings
      headers:
        - name: Content-Type
          from: literal
          value: application/json
      body:
        - path:
            - model
          from: filter
          key: model
        - path:
            - input
          from: filter
          key: input
    response:
      row_strategy: direct
    pagination:
      mode: none
    columns:
      - name: model
        type: Utf8
        nullable: false
        virtual: true
        description: Embedding model supplied in SQL filter.
        expr:
          kind: from_filter
          key: model
      - name: input
        type: Utf8
        nullable: false
        virtual: true
        description: Input text supplied in SQL filter.
        expr:
          kind: from_filter
          key: input
      - name: id
        type: Utf8
        nullable: true
        description: Embedding response ID.
      - name: returned_model
        type: Utf8
        nullable: true
        description: Actual embedding model returned by Mistral AI.
        expr:
          kind: path
          path:
            - model
      - name: object
        type: Utf8
        nullable: true
        description: API object type.
      - name: usage
        type: Json
        nullable: true
        description: Token usage metadata returned by Mistral AI.
      - name: prompt_tokens
        type: Int64
        nullable: true
        description: Prompt token count.
        expr:
          kind: path
          path:
            - usage
            - prompt_tokens
      - name: completion_tokens
        type: Int64
        nullable: true
        description: Completion token count when returned.
        expr:
          kind: path
          path:
            - usage
            - completion_tokens
      - name: total_tokens
        type: Int64
        nullable: true
        description: Total token count.
        expr:
          kind: path
          path:
            - usage
            - total_tokens
      - name: data
        type: Json
        nullable: true
        description: Raw embedding data array returned by Mistral AI.
      - name: index
        type: Int64
        nullable: true
        description: First embedding row index.
        expr:
          kind: path
          path:
            - data
            - "0"
            - index
      - name: embedding_object
        type: Utf8
        nullable: true
        description: First embedding object type.
        expr:
          kind: path
          path:
            - data
            - "0"
            - object
      - name: embedding
        type: Json
        nullable: true
        description: Embedding vector returned by Mistral AI.
        expr:
          kind: path
          path:
            - data
            - "0"
            - embedding
