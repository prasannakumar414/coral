        - name: lastModStartDate
          from: filter
          key: last_mod_start_date
        - name: lastModEndDate
          from: filter
          key: last_mod_end_date
        - name: cvssV3Severity
          from: filter
          key: cvss_v3_severity
        - name: keywordSearch
          from: filter
          key: keyword_search
    response:
