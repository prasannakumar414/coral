        expr: {kind: from_filter, key: keyword_search}

  - name: references
    description: >-
      Advisory and patch reference links for CVE records. Each row is one CVE
      with its full references array. The references column is a JSON array
      where each element contains url, source, and tags fields.
      Join to nvd.vulnerabilities on cve_id.
    guide: >-
      Filter by cve_id to retrieve references for a specific CVE. Use
      json_get to extract individual reference objects, then json_get_str to
      read url, source, or tags fields.
    fetch_limit_default: 100
    filters:
      - name: cve_id
        required: false
      - name: pub_start_date
        required: false
      - name: pub_end_date
        required: false
      - name: last_mod_start_date
        required: false
