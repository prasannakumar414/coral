        default: 2000
        max: 2000
        query_param: resultsPerPage
    columns:
      - name: cve_id
        type: Utf8
        description: CVE identifier linking to nvd.vulnerabilities.
        nullable: true
        expr: {kind: path, path: [cve, id]}
      - name: metrics
        type: Json
        description: >-
          Full cvssMetricV30 array from NVD. Same element structure as
          cvss_v3_1_metrics. Null when NVD has not assigned CVSS v3.0 metrics
