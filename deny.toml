# cargo-deny configuration. Run with: `make license-check`
# (or `cargo deny check licenses` directly).
#
# Allow-list approach: anything not listed below fails by default. Anything
# we haven't reviewed and accepted stays out of the supply chain. Add new
# entries deliberately.

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    # Used by `webpki-root-certs`, which ships Mozilla's CA root certificate
    # bundle. Pulled in by reqwest 0.13's mandatory `rustls-platform-verifier`
    # dep on the MCP Streamable HTTP path. Linux Foundation permissive data
    # license; cleared for redistribution.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    # Accepted for AWS-LC (`aws-lc-sys`) when using rustls' default
    # crypto provider through reqwest/rmcp.
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "bzip2-1.0.6",
]
